<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SXMB v5.3 FIXED — CHẶN N-1</title>
<style>
body{font-family:system-ui;margin:16px;background:#fafafa}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:12px;margin-top:12px}
textarea{width:100%;min-height:140px;padding:10px}
button{padding:8px 12px;border-radius:8px;border:0;background:#111;color:#fff}
.big{font-size:28px;font-weight:bold}
</style>
</head>
<body>

<h2>SXMB v5.3 — FIX N-1 + PARSE SẠCH</h2>

<div class="card">
Ngày N
<textarea id="n"></textarea>
</div>

<div class="card">
Ngày N-1
<textarea id="n1"></textarea>
</div>

<div class="card">
Ngày N-2
<textarea id="n2"></textarea>
</div>

<div class="card">
<button onclick="run()">CHỐT</button>
<div id="kq"></div>
</div>

<script>
function parseNums(text){
  const lines = text.split("\n");
  const out = [];

  for(let L of lines){
    L = L.trim();

    if(!/^(ĐB|DB|G)/i.test(L)) continue;

    const nums = L.match(/\d+/g) || [];

    for(let n of nums){
      if(n.length >= 2){
        out.push(parseInt(n.slice(-2)));
      }
    }
  }
  return out;
}

function freq(arr){
  const m = {};
  arr.forEach(x => m[x]=(m[x]||0)+1);
  return m;
}

function run(){
  const N = parseNums(document.getElementById("n").value);
  const N1 = parseNums(document.getElementById("n1").value);
  const N2 = parseNums(document.getElementById("n2").value);

  const all = [...N, ...N1, ...N2];

  const tailCount = Array(10).fill(0);
  all.forEach(x => tailCount[x%10]++);

  const tails = [...tailCount.map((v,i)=>({i,v}))].sort((a,b)=>b.v-a.v);
  const tail = tails[0].i;

  let candidates = [];
  for(let h=0;h<10;h++){
    candidates.push(h*10 + tail);
  }

  const fN = freq(N);
  const fN1 = freq(N1);

  let scored = candidates.map(n=>{
    let s=0;

    if(!fN[n] && fN1[n]) s+=1;
    if(fN[n]==1) s+=3;
    if(fN[n]>=2) s-=4;
    if(fN[n] && fN1[n]) s-=2;

    return {n, s};
  });

  scored.sort((a,b)=>b.s-a.s);

  let chot = null;
  for(let i=0;i<scored.length;i++){
    if(!N1.includes(scored[i].n)){
      chot = scored[i].n;
      break;
    }
  }

  if(chot===null) chot = scored[0].n;

  document.getElementById("kq").innerHTML =
    '<div class="big">CHỐT: ' + String(chot).padStart(2,"0") + '</div>';
}
</script>

</body>
</html>
