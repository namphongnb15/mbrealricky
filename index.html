<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB STABLE v1 - TOP1 LOCK</title>
<style>
body{
  background:#0f172a;
  color:#e2e8f0;
  font-family:system-ui;
  padding:20px;
  max-width:900px;
  margin:auto;
}
h1{font-size:22px}
.box{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
textarea,input{
  width:100%;
  background:#0f172a;
  color:#e2e8f0;
  border:1px solid #334155;
  border-radius:6px;
  padding:8px;
}
button{
  padding:8px 12px;
  border-radius:6px;
  border:none;
  cursor:pointer;
}
.btn{background:#22c55e;color:black}
.btn2{background:#475569;color:white}
.btn3{background:#ef4444;color:white}
.result{
  font-size:28px;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}
.history-item{
  background:#0f172a;
  padding:10px;
  border-radius:6px;
  margin-bottom:8px;
}
.small{font-size:12px;color:#94a3b8}
</style>
</head>
<body>

<h1>MB STABLE v1 — CHỐT TOP 1 (LOCK)</h1>

<div class="box">
<label>Ngày chốt</label>
<input type="date" id="ngay">
</div>

<div class="box">
<label>D1 (mới nhất)</label>
<textarea id="d1" rows="3"></textarea>
<button class="btn3" onclick="clearBox('d1')">Xoá D1</button>
</div>

<div class="box">
<label>D2</label>
<textarea id="d2" rows="3"></textarea>
<button class="btn3" onclick="clearBox('d2')">Xoá D2</button>
</div>

<div class="box">
<label>D3 (nhịp)</label>
<textarea id="d3" rows="3"></textarea>
<button class="btn3" onclick="clearBox('d3')">Xoá D3</button>
</div>

<div class="box">
<button class="btn" onclick="runSystem()">CHẠY & CHỐT</button>
<div class="result" id="top1">--</div>
<div class="small" id="gate"></div>
</div>

<div class="box">
<h3>Lịch sử</h3>
<div id="history"></div>
<button class="btn2" onclick="exportJSON()">COPY JSON</button>
</div>

<script>
let historyData=[];

function clearBox(id){
  document.getElementById(id).value="";
}

function extractLo(str){
  let nums=str.match(/\d+/g)||[];
  return nums.map(n=>n.slice(-2).padStart(2,"0"));
}

function countHeadTail(arr){
  let head={},tail={};
  arr.forEach(n=>{
    let h=n[0],t=n[1];
    head[h]=(head[h]||0)+1;
    tail[t]=(tail[t]||0)+1;
  });
  return {head,tail};
}

function top3(obj){
  return Object.entries(obj)
  .sort((a,b)=>b[1]-a[1])
  .slice(0,3)
  .map(x=>x[0]);
}

function clusterScore(arr){
  let freq={};
  arr.forEach(n=>freq[n]=(freq[n]||0)+1);
  let clusters=Object.values(freq).filter(v=>v>=2).length;
  return clusters>=2?2:clusters==1?1:0;
}

function runSystem(){
  let d1=extractLo(document.getElementById("d1").value);
  let d2=extractLo(document.getElementById("d2").value);
  let d3=extractLo(document.getElementById("d3").value);

  if(d1.length==0||d2.length==0){
    alert("D1 và D2 bắt buộc");
    return;
  }

  let all=[...d1,...d2];
  let c=countHeadTail(all);
  let topHead=top3(c.head);
  let topTail=top3(c.tail);

  let candidates=[];
  topHead.forEach(h=>{
    topTail.forEach(t=>{
      candidates.push(h+t);
    });
  });

  let scores={};

  candidates.forEach(n=>{
    let h=n[0],t=n[1];
    let headScore=(c.head[h]||0)*5;
    let tailScore=(c.tail[t]||0)*5;
    let cl=clusterScore(all)*10;
    let total=headScore+tailScore+cl;
    scores[n]=total;
  });

  let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  let top=sorted[0][0];

  let gateScore=clusterScore(all)+clusterScore(d3);
  document.getElementById("gate").innerText="Gate: "+gateScore;

  document.getElementById("top1").innerText=top;

  let ngay=document.getElementById("ngay").value;
  historyData.unshift({
    date:ngay,
    top1:top,
    gate:gateScore,
    result:null
  });

  renderHistory();
}

function markResult(index,res){
  historyData[index].result=res;
  renderHistory();
}

function renderHistory(){
  let html="";
  historyData.forEach((h,i)=>{
    html+=`
      <div class="history-item">
      <b>${h.date}</b> - Chốt: ${h.top1}
      <br>Gate: ${h.gate}
      <br>
      <button onclick="markResult(${i},'Trúng')" class="btn">Trúng</button>
      <button onclick="markResult(${i},'Trượt')" class="btn3">Trượt</button>
      <div class="small">${h.result||""}</div>
      </div>
    `;
  });
  document.getElementById("history").innerHTML=html;
}

function exportJSON(){
  let data=JSON.stringify(historyData,null,2);
  navigator.clipboard.writeText(data);
  alert("Đã copy JSON");
}
</script>

</body>
</html>
